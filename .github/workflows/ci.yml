name: KOOLIXA CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Eslint Audit
        run: npm run lint

      - name: Run TypeScript Compiler Check
        run: npx tsc --noEmit

      - name: Verify Production Next.js Build
        run: npm run build
        env:
          NEXT_PUBLIC_VERCEL_ENV: production
